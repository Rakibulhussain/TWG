name: Expo Auto Update

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Publish Update
        run: eas update --branch preview --message "auto update"
        env:
          EXPO_TOKEN: ${{ secrets.TGWTOKEN }}
          CI: 1